name: Linux images

on:
  workflow_dispatch:
    inputs:
      ubuntu22_full_x64:
        type: boolean
        description: ubuntu22-full-x64
        default: true
      ubuntu22_full_arm64:
        type: boolean
        description: ubuntu22-full-arm64
        default: true
      ubuntu24_full_x64:
        type: boolean
        description: ubuntu24-full-x64
        default: true
      ubuntu24_full_arm64:
        type: boolean
        description: ubuntu24-full-arm64
        default: true
      ubuntu26_full_x64:
        type: boolean
        description: ubuntu26-full-x64
        default: false
      ubuntu26_full_arm64:
        type: boolean
        description: ubuntu26-full-arm64
        default: false
  schedule:
    - cron: '0 8 2,17 * *'

jobs:
  select-images:
    name: Select images
    runs-on: ubuntu-latest
    outputs:
      image_ids: ${{ steps.select.outputs.image_ids }}
    steps:
      - id: select
        env:
          UBUNTU22_FULL_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.ubuntu22_full_x64 }}
          UBUNTU22_FULL_ARM64: ${{ github.event_name != 'workflow_dispatch' || inputs.ubuntu22_full_arm64 }}
          UBUNTU24_FULL_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.ubuntu24_full_x64 }}
          UBUNTU24_FULL_ARM64: ${{ github.event_name != 'workflow_dispatch' || inputs.ubuntu24_full_arm64 }}
          UBUNTU26_FULL_X64: ${{ github.event_name == 'workflow_dispatch' && inputs.ubuntu26_full_x64 }}
          UBUNTU26_FULL_ARM64: ${{ github.event_name == 'workflow_dispatch' && inputs.ubuntu26_full_arm64 }}
        run: |
          images=()
          [ "$UBUNTU22_FULL_X64" = "true" ] && images+=("ubuntu22-full-x64")
          [ "$UBUNTU22_FULL_ARM64" = "true" ] && images+=("ubuntu22-full-arm64")
          [ "$UBUNTU24_FULL_X64" = "true" ] && images+=("ubuntu24-full-x64")
          [ "$UBUNTU24_FULL_ARM64" = "true" ] && images+=("ubuntu24-full-arm64")
          [ "$UBUNTU26_FULL_X64" = "true" ] && images+=("ubuntu26-full-x64")
          [ "$UBUNTU26_FULL_ARM64" = "true" ] && images+=("ubuntu26-full-arm64")
          if [ "${#images[@]}" -eq 0 ]; then
            echo "No images selected" >&2
            exit 1
          fi
          image_ids="$(printf '%s\n' "${images[@]}" | jq -R . | jq -s -c .)"
          echo "image_ids=$image_ids" >> "$GITHUB_OUTPUT"

  sync:
    uses: ./.github/workflows/sync.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      release_prefix: linux
      ami_cleanup_prefix: runs-on-dev-ubuntu
      dist_prefix: ubuntu

  build-test-release:
    name: Build/Test/Release ${{ matrix.image_id }}
    needs:
      - select-images
      - sync
    strategy:
      fail-fast: false
      matrix:
        image_id: ${{ fromJSON(needs.select-images.outputs.image_ids) }}
    uses: ./.github/workflows/build-test-release.yml
    secrets: inherit
    with:
      image_id: ${{ matrix.image_id }}
      platform: linux

  generate-release:
    needs:
      - sync
      - build-test-release
    uses: ./.github/workflows/generate-release.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      release_name: ${{ needs.sync.outputs.release_name }}
