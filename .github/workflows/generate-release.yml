name: Generate release

# Reusable release-aggregation job shared by the matrix-* workflows: collects
# the released-ami-* artifacts and publishes a GitHub release.
on:
  workflow_call:
    inputs:
      release_name:
        description: 'Tag name for the GitHub release'
        type: string
        required: true

jobs:
  generate-release:
    name: Generate release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          pattern: released-ami-*
          path: release-summaries
          merge-multiple: true
      - name: Render release changelog
        run: ruby bin/render-release-changelog release-summaries > release-body.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          tag_name: ${{ inputs.release_name }}
          make_latest: true
