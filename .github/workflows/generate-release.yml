name: Generate release

# Reusable release-aggregation job shared by the matrix-* workflows: collects
# the released-ami-* artifacts and publishes a GitHub release.
on:
  workflow_call:
    inputs:
      release_name:
        description: 'Tag name for the GitHub release'
        type: string
        required: true

jobs:
  generate-release:
    name: Generate release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: released-ami-*
          path: release-summaries
          merge-multiple: true
      - name: Render release changelog
        run: ruby bin/render-release-changelog release-summaries > release-body.md
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: release-body.md
          tag_name: ${{ inputs.release_name }}
          make_latest: true
