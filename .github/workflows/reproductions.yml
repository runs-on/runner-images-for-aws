name: Reproductions

on:
  workflow_dispatch:
    inputs:
      jobs:
        type: string
        required: true
        description: 'Reproduction job IDs to run'
        default: '["php-ubuntu24-arm64", "git-lfs-ubuntu24-arm64", "imageos-ubuntu24-x64", "issue-16-ubuntu24-x64-github-path-login-shell", "issue-16-ubuntu-latest-github-path-debug", "issue-41-ubuntu24-gpu-arm64", "issue-19-windows25-hyperv-vs-cpp"]'

permissions:
  contents: read

jobs:
  php-ubuntu24-arm64:
    if: ${{ contains(fromJSON(github.event.inputs.jobs || '["php-ubuntu24-arm64", "git-lfs-ubuntu24-arm64", "imageos-ubuntu24-x64", "issue-16-ubuntu24-x64-github-path-login-shell", "issue-16-ubuntu-latest-github-path-debug", "issue-41-ubuntu24-gpu-arm64", "issue-19-windows25-hyperv-vs-cpp"]'), 'php-ubuntu24-arm64') }}
    name: Fast PHP installs on ubuntu24-full-arm64
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-arm64/image=ubuntu24-dev-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Show PHP defaults
        run: |
          command -v php || true
          php -v || true
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - name: Check PHP 8.3
        run: php -v
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Check PHP 8.4
        run: php -v

  git-lfs-ubuntu24-arm64:
    if: ${{ contains(fromJSON(github.event.inputs.jobs || '["php-ubuntu24-arm64", "git-lfs-ubuntu24-arm64", "imageos-ubuntu24-x64", "issue-16-ubuntu24-x64-github-path-login-shell", "issue-16-ubuntu-latest-github-path-debug", "issue-41-ubuntu24-gpu-arm64", "issue-19-windows25-hyperv-vs-cpp"]'), 'git-lfs-ubuntu24-arm64') }}
    name: git-lfs on ubuntu24-full-arm64
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-arm64/image=ubuntu24-dev-arm64
    steps:
      - name: Check git-lfs is available
        run: |
          command -v git-lfs
          git-lfs version

  imageos-ubuntu24-x64:
    if: ${{ contains(fromJSON(github.event.inputs.jobs || '["php-ubuntu24-arm64", "git-lfs-ubuntu24-arm64", "imageos-ubuntu24-x64", "issue-16-ubuntu24-x64-github-path-login-shell", "issue-16-ubuntu-latest-github-path-debug", "issue-41-ubuntu24-gpu-arm64", "issue-19-windows25-hyperv-vs-cpp"]'), 'imageos-ubuntu24-x64') }}
    name: ImageOS/ImageVersion on ubuntu24-full-x64
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64/image=ubuntu24-full-x64
    steps:
      - name: Check ImageOS and ImageVersion env vars
        run: |
          echo "ImageOS=$ImageOS"
          echo "ImageVersion=$ImageVersion"
          test -n "$ImageOS" || (echo "ERROR: ImageOS is not set" && exit 1)
          test -n "$ImageVersion" || (echo "ERROR: ImageVersion is not set" && exit 1)

  issue-16-ubuntu24-x64-github-path-login-shell:
    if: ${{ contains(fromJSON(github.event.inputs.jobs || '["php-ubuntu24-arm64", "git-lfs-ubuntu24-arm64", "imageos-ubuntu24-x64", "issue-16-ubuntu24-x64-github-path-login-shell", "issue-16-ubuntu-latest-github-path-debug", "issue-41-ubuntu24-gpu-arm64", "issue-19-windows25-hyperv-vs-cpp"]'), 'issue-16-ubuntu24-x64-github-path-login-shell') }}
    name: issue-16 ubuntu24 x64 GITHUB_PATH with login shell
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64/image=ubuntu24-full-x64
    defaults:
      run:
        shell: bash -leo pipefail {0}
    steps:
      - name: Create marker binary and append to GITHUB_PATH
        run: |
          ISSUE_16_BIN_DIR="$RUNNER_TEMP/issue-16-bin"
          mkdir -p "$ISSUE_16_BIN_DIR"
          cat <<'EOF' > "$ISSUE_16_BIN_DIR/issue-16-marker"
          #!/usr/bin/env bash
          echo "issue-16-marker ok"
          EOF
          chmod +x "$ISSUE_16_BIN_DIR/issue-16-marker"
          printf '%s\n' "$ISSUE_16_BIN_DIR" >> "$GITHUB_PATH"
          echo "Wrote $ISSUE_16_BIN_DIR to GITHUB_PATH"

      - name: Check whether PATH picked up GITHUB_PATH
        id: issue-16-path-check
        continue-on-error: true
        run: |
          echo "$PATH"
          command -v issue-16-marker
          issue-16-marker

      - name: Report issue-16 result
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.issue-16-path-check.outcome }}" == "success" ]]; then
            echo "Issue #16 appears fixed: PATH included the directory written to GITHUB_PATH."
          else
            echo "Issue #16 reproduces: PATH did not include the directory written to GITHUB_PATH."
            exit 1
          fi

  issue-16-ubuntu-latest-github-path-debug:
    if: ${{ contains(fromJSON(github.event.inputs.jobs || '["php-ubuntu24-arm64", "git-lfs-ubuntu24-arm64", "imageos-ubuntu24-x64", "issue-16-ubuntu24-x64-github-path-login-shell", "issue-16-ubuntu-latest-github-path-debug", "issue-41-ubuntu24-gpu-arm64", "issue-19-windows25-hyperv-vs-cpp"]'), 'issue-16-ubuntu-latest-github-path-debug') }}
    name: issue-16 ubuntu-latest GITHUB_PATH debug
    runs-on: ubuntu-latest
    steps:
      - name: Dump runner shell setup
        run: |
          set -euxo pipefail
          echo "runner.name=$RUNNER_NAME"
          echo "runner.os=$RUNNER_OS"
          echo "runner.arch=$RUNNER_ARCH"
          echo "image.os=${ImageOS:-}"
          echo "image.version=${ImageVersion:-}"
          echo "user=$(whoami)"
          echo "home=$HOME"
          echo "shell=${SHELL:-}"
          echo "pwd=$PWD"
          echo "PATH=$PATH"
          for file in /etc/environment /etc/profile /etc/bash.bashrc "$HOME/.profile" "$HOME/.bash_profile" "$HOME/.bashrc"; do
            echo "::group::${file}"
            if [[ -f "$file" ]]; then
              sed -n '1,220p' "$file"
            else
              echo "missing"
            fi
            echo "::endgroup::"
          done

      - name: Add marker directory to GITHUB_PATH
        run: |
          set -euxo pipefail
          ISSUE_16_BIN_DIR="$RUNNER_TEMP/issue-16-bin"
          mkdir -p "$ISSUE_16_BIN_DIR"
          cat <<'EOF' > "$ISSUE_16_BIN_DIR/issue-16-marker"
          #!/usr/bin/env bash
          echo "issue-16-marker ok"
          EOF
          chmod +x "$ISSUE_16_BIN_DIR/issue-16-marker"
          printf '%s\n' "$ISSUE_16_BIN_DIR" >> "$GITHUB_PATH"
          echo "Wrote $ISSUE_16_BIN_DIR to GITHUB_PATH"

      - name: Check default shell PATH
        id: issue-16-gh-default-shell
        continue-on-error: true
        run: |
          set -euxo pipefail
          echo "PATH=$PATH"
          command -v issue-16-marker
          issue-16-marker

      - name: Check login shell PATH
        id: issue-16-gh-login-shell
        continue-on-error: true
        shell: bash -leo pipefail {0}
        run: |
          set -euxo pipefail
          echo "PATH=$PATH"
          command -v issue-16-marker
          issue-16-marker

      - name: Compare child shell startup modes
        id: issue-16-gh-child-shells
        continue-on-error: true
        run: |
          set -euxo pipefail
          echo "::group::bash -c"
          bash -c 'echo "PATH=$PATH"; command -v issue-16-marker; issue-16-marker'
          echo "::endgroup::"
          echo "::group::bash -l -c"
          bash -l -c 'echo "PATH=$PATH"; command -v issue-16-marker; issue-16-marker'
          echo "::endgroup::"

      - name: Report ubuntu-latest outcomes
        if: ${{ always() }}
        run: |
          echo "default-shell=${{ steps.issue-16-gh-default-shell.outcome }}"
          echo "login-shell=${{ steps.issue-16-gh-login-shell.outcome }}"
          echo "child-shells=${{ steps.issue-16-gh-child-shells.outcome }}"

  issue-41-ubuntu24-gpu-arm64:
    if: ${{ contains(fromJSON(github.event.inputs.jobs || '["php-ubuntu24-arm64", "git-lfs-ubuntu24-arm64", "imageos-ubuntu24-x64", "issue-16-ubuntu24-x64-github-path-login-shell", "issue-16-ubuntu-latest-github-path-debug", "issue-41-ubuntu24-gpu-arm64", "issue-19-windows25-hyperv-vs-cpp"]'), 'issue-41-ubuntu24-gpu-arm64') }}
    name: issue-41 ubuntu24 GPU arm64 on g5g
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-arm64/image=ubuntu24-gpu-arm64/family=g5g
    steps:
      - name: Check NVIDIA tooling
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
      - name: CUDA container smoke test
        run: docker run --rm --gpus all nvidia/cuda:12.9.1-base-ubuntu24.04 nvidia-smi

  issue-19-windows25-hyperv-vs-cpp:
    if: ${{ contains(fromJSON(github.event.inputs.jobs || '["php-ubuntu24-arm64", "git-lfs-ubuntu24-arm64", "imageos-ubuntu24-x64", "issue-16-ubuntu24-x64-github-path-login-shell", "issue-16-ubuntu-latest-github-path-debug", "issue-41-ubuntu24-gpu-arm64", "issue-19-windows25-hyperv-vs-cpp"]'), 'issue-19-windows25-hyperv-vs-cpp') }}
    name: issue-19 windows25 Hyper-V + VS + C++
    runs-on: runs-on=${{ github.run_id }}/image=windows25-dev-x64/family=m8i
    steps:
      - name: Check Visual Studio install
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found at $vswhere" }
          $installPath = (& $vswhere -latest -products * -property installationPath | Select-Object -First 1).Trim()
          if (-not $installPath) { throw "Visual Studio installation path not found" }
          $devenv = Join-Path $installPath "Common7\IDE\devenv.exe"
          if (-not (Test-Path $devenv)) { throw "devenv.exe not found at $devenv" }
          Write-Host "Visual Studio installation path: $installPath"

      - name: Check C++ toolchain (cl.exe)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = (& $vswhere -latest -products * -property installationPath | Select-Object -First 1).Trim()
          if (-not $installPath) { throw "Visual Studio installation path not found" }
          $vsDevCmd = Join-Path $installPath "Common7\Tools\VsDevCmd.bat"
          if (-not (Test-Path $vsDevCmd)) { throw "VsDevCmd.bat not found at $vsDevCmd" }
          cmd.exe /c "\"$vsDevCmd\" -arch=x64 >nul && where cl"
          if ($LASTEXITCODE -ne 0) { throw "cl.exe not found from VS developer command prompt" }

      - name: Check issue-19 package set
        shell: pwsh
        run: |
          $required = @("bash", "cargo", "rustc", "pwsh", "AzureSignTool")
          foreach ($tool in $required) {
            $found = Get-Command $tool -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($null -eq $found) { throw "$tool was not found on PATH" }
            Write-Host "$tool => $($found.Source)"
          }
          pwsh --version
          cargo --version
          rustc --version
          AzureSignTool --version

      - name: Check Hyper-V feature states
        shell: pwsh
        run: |
          $serverFeatures = @("Hyper-V", "Hyper-V-PowerShell")
          foreach ($feature in $serverFeatures) {
            $state = (Get-WindowsFeature -Name $feature).InstallState
            Write-Host "$feature=$state"
            if ($state -ne "Installed") { throw "$feature is not Installed" }
          }
          $optionalState = (Get-WindowsOptionalFeature -Online -FeatureName "HypervisorPlatform").State
          Write-Host "HypervisorPlatform=$optionalState"
          if ($optionalState -ne "Enabled") { throw "HypervisorPlatform is not Enabled" }

      - name: Hyper-V diagnostics (systeminfo)
        shell: pwsh
        run: |
          systeminfo
