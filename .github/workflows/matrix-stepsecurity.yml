name: StepSecurity images

on:
  workflow_dispatch:
    inputs:
      ubuntu24_stepsecurity_x64:
        type: boolean
        description: ubuntu24-stepsecurity-x64
        default: true
      ubuntu24_stepsecurity_arm64:
        type: boolean
        description: ubuntu24-stepsecurity-arm64
        default: true
      ubuntu22_stepsecurity_x64:
        type: boolean
        description: ubuntu22-stepsecurity-x64
        default: true
      ubuntu22_stepsecurity_arm64:
        type: boolean
        description: ubuntu22-stepsecurity-arm64
        default: true
  workflow_run:
    workflows: ['Linux images']
    branches: [main]
    types:
      - completed

jobs:
  select-images:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    name: Select images
    runs-on: ubuntu-latest
    outputs:
      image_ids: ${{ steps.select.outputs.image_ids }}
    steps:
      - id: select
        env:
          UBUNTU24_STEPSECURITY_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.ubuntu24_stepsecurity_x64 }}
          UBUNTU24_STEPSECURITY_ARM64: ${{ github.event_name != 'workflow_dispatch' || inputs.ubuntu24_stepsecurity_arm64 }}
          UBUNTU22_STEPSECURITY_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.ubuntu22_stepsecurity_x64 }}
          UBUNTU22_STEPSECURITY_ARM64: ${{ github.event_name != 'workflow_dispatch' || inputs.ubuntu22_stepsecurity_arm64 }}
        run: |
          images=()
          [ "$UBUNTU24_STEPSECURITY_X64" = "true" ] && images+=("ubuntu24-stepsecurity-x64")
          [ "$UBUNTU24_STEPSECURITY_ARM64" = "true" ] && images+=("ubuntu24-stepsecurity-arm64")
          [ "$UBUNTU22_STEPSECURITY_X64" = "true" ] && images+=("ubuntu22-stepsecurity-x64")
          [ "$UBUNTU22_STEPSECURITY_ARM64" = "true" ] && images+=("ubuntu22-stepsecurity-arm64")
          if [ "${#images[@]}" -eq 0 ]; then
            echo "No images selected" >&2
            exit 1
          fi
          image_ids="$(printf '%s\n' "${images[@]}" | jq -R . | jq -s -c .)"
          echo "image_ids=$image_ids" >> "$GITHUB_OUTPUT"

  build-test-release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    name: Build/Test/Release ${{ matrix.image_id }}
    needs: select-images
    strategy:
      fail-fast: false
      matrix:
        image_id: ${{ fromJSON(needs.select-images.outputs.image_ids) }}
    uses: ./.github/workflows/build-test-release.yml
    secrets: inherit
    with:
      image_id: ${{ matrix.image_id }}
