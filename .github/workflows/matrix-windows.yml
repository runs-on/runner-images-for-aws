name: Windows images

on:
  workflow_dispatch:
    inputs:
      windows22_full_x64:
        type: boolean
        description: windows22-full-x64
        default: true
      windows25_full_x64:
        type: boolean
        description: windows25-full-x64
        default: true
      windows25_gpu_x64:
        type: boolean
        description: windows25-gpu-x64
        default: true
  schedule:
    - cron: '0 6 2,17 * *'

jobs:
  select-images:
    name: Select images
    runs-on: ubuntu-latest
    outputs:
      image_ids: ${{ steps.select.outputs.image_ids }}
    steps:
      - id: select
        env:
          WINDOWS22_FULL_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.windows22_full_x64 }}
          WINDOWS25_FULL_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.windows25_full_x64 }}
          WINDOWS25_GPU_X64: ${{ github.event_name == 'workflow_dispatch' && inputs.windows25_gpu_x64 }}
        run: |
          images=()
          [ "$WINDOWS22_FULL_X64" = "true" ] && images+=("windows22-full-x64")
          [ "$WINDOWS25_FULL_X64" = "true" ] && images+=("windows25-full-x64")
          [ "$WINDOWS25_GPU_X64" = "true" ] && images+=("windows25-gpu-x64")
          if [ "${#images[@]}" -eq 0 ]; then
            echo "No images selected" >&2
            exit 1
          fi
          image_ids="$(printf '%s\n' "${images[@]}" | jq -R . | jq -s -c .)"
          echo "image_ids=$image_ids" >> "$GITHUB_OUTPUT"

  sync:
    uses: ./.github/workflows/sync.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      release_prefix: windows
      ami_cleanup_prefix: runs-on-dev-windows
      dist_prefix: windows

  build-test-release:
    name: Build/Test/Release ${{ matrix.image_id }}
    needs:
      - select-images
      - sync
    strategy:
      fail-fast: false
      matrix:
        image_id: ${{ fromJSON(needs.select-images.outputs.image_ids) }}
    uses: ./.github/workflows/build-test-release.yml
    secrets: inherit
    with:
      image_id: ${{ matrix.image_id }}
      platform: windows

  generate-release:
    needs:
      - sync
      - build-test-release
    uses: ./.github/workflows/generate-release.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      release_name: ${{ needs.sync.outputs.release_name }}
