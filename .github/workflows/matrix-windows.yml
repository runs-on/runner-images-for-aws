name: Windows images

on:
  workflow_dispatch:
    inputs:
      images:
        type: string
        required: true
        description: 'Distribution(s) to build'
        default: '["windows22-full-x64", "windows25-full-x64", "windows25-gpu-x64"]'
  schedule:
    - cron: '0 6 2,17 * *'

jobs:
  sync:
    uses: ./.github/workflows/sync.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      release_prefix: windows
      ami_cleanup_prefix: runs-on-dev-windows
      dist_prefix: windows

  build-test-release:
    name: Build/Test/Release ${{ matrix.image_id }}
    needs: sync
    strategy:
      fail-fast: false
      matrix:
        image_id: ${{ fromJSON(github.event.inputs.images || '["windows22-full-x64", "windows25-full-x64"]') }}
    uses: ./.github/workflows/build-test-release.yml
    secrets: inherit
    with:
      image_id: ${{ matrix.image_id }}
      platform: windows

  generate-release:
    needs:
      - sync
      - build-test-release
    uses: ./.github/workflows/generate-release.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      release_name: ${{ needs.sync.outputs.release_name }}
