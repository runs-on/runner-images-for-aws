name: Minimal images

on:
  workflow_dispatch:
    inputs:
      images:
        type: string
        required: true
        description: 'Distribution(s) to build'
        default: '["ubuntu24-minimal-x64", "ubuntu24-minimal-arm64"]'
  schedule:
    # staggered after matrix-linux (08:00 same days) to avoid concurrent
    # "Sync from upstream" auto-commit push races
    - cron: '0 10 2,17 * *'

jobs:
  sync:
    uses: ./.github/workflows/sync.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      release_prefix: minimal
      ami_cleanup_prefix: runs-on-dev-ubuntu24-minimal
      dist_prefix: ubuntu

  build-test-release:
    name: Build/Test/Release ${{ matrix.image_id }}
    needs: sync
    strategy:
      fail-fast: false
      matrix:
        image_id: ${{ fromJSON(github.event.inputs.images || '["ubuntu24-minimal-x64", "ubuntu24-minimal-arm64"]') }}
    uses: ./.github/workflows/build-test-release-minimal.yml
    secrets: inherit
    with:
      image_id: ${{ matrix.image_id }}

  generate-release:
    needs:
      - sync
      - build-test-release
    uses: ./.github/workflows/generate-release.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      release_name: ${{ needs.sync.outputs.release_name }}
