name: Build Test Release Minimal
run-name: ${{ inputs.image_id }}

on:
  workflow_call:
    inputs:
      # e.g. ubuntu24-minimal-x64
      image_id:
        required: true
        type: string
    outputs:
      ami_name:
        description: "The name of the built AMI"
        value: ${{ jobs.build.outputs.ami_name }}
      ami_id:
        description: "The ID of the built AMI"
        value: ${{ jobs.build.outputs.ami_id }}

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      image_id: ${{ inputs.image_id }}
    secrets: inherit

  test:
    name: Test
    needs:
      - build
    runs-on: runs-on=${{ github.run_id }}/env=bootstrap/family=m7/cpu=2+4/ami=${{ needs.build.outputs.ami_id }}
    steps:
      - name: Ensure apt-get update is working
        run: sudo apt-get update
      - name: Ensure code can be checked out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Docker
        run: |
          docker version
          docker run hello-world
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Node.js
        run: |
          node --version
          npm --version

  release:
    if: ${{ !failure() && !cancelled() }}
    needs:
      - build
      - test
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      image_id: ${{ inputs.image_id }}
      ami_name: ${{ needs.build.outputs.ami_name }}
