name: Build
run-name: Build ${{ inputs.image_id }}

on:
  workflow_dispatch:
    inputs:
      image_id:
        required: true
        type: string
  workflow_call:
    inputs:
      image_id:
        required: true
        type: string
    outputs:
      ami_name:
        description: "The name of the built AMI"
        value: ${{ jobs.build.outputs.ami_name }}
      ami_id:
        description: "The ID of the built AMI"
        value: ${{ jobs.build.outputs.ami_id }}

jobs:
  build:
    name: Build ${{ inputs.image_id }}
    runs-on: ubuntu-latest
    env:
      SUBNET_ID: ${{ secrets.SUBNET_ID }}
    outputs:
      ami_name: ${{ steps.build.outputs.ami_name }}
      ami_id: ${{ steps.build.outputs.ami_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: webfactory/ssh-agent@72c0bfd31ab22a2e11716951e3f107a9647dc97e
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY_FOR_INTEGRATIONS }}
      - run: git log --oneline -n 1
      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: 1.15.0
      - name: Setup Go (windows25 custom plugin)
        if: ${{ inputs.image_id == 'windows25-full-x64' }}
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.1
      - name: Build patched amazon plugin (windows25)
        if: ${{ inputs.image_id == 'windows25-full-x64' }}
        id: patched_amazon_plugin
        run: |
          plugin_binary="$(./scripts/build-patched-packer-plugin-amazon.sh)"
          echo "plugin_binary=$plugin_binary" >> "$GITHUB_OUTPUT"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: bundle exec bin/build --image-id ${{ inputs.image_id }}
        id: build
        timeout-minutes: 300
        env:
          PACKER_AMAZON_PLUGIN_BINARY: ${{ steps.patched_amazon_plugin.outputs.plugin_binary }}
