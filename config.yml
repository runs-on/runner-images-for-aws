# AMI naming prefixes (single source of truth, read by bin/copy-ami and
# bin/utils/cleanup-amis)
ami_dev_prefix: runs-on-dev
ami_prod_prefix: runs-on-v2.2
regions:
  - us-east-1
  - us-east-2
  - us-west-2
  - eu-west-1
  - eu-west-2
  - eu-west-3
  - eu-central-1
  - ap-south-1
  - ap-northeast-1
  - ap-southeast-1
  - ap-southeast-2
images:
  # Shared templates (template: key, resolved by bin/build against
  # patches/<dist>/templates/<template>.pkr.hcl; defaults to <id>.pkr.hcl).
  # install_scripts is the full ordered build script list for shared Ubuntu
  # full-image templates.

  # Ubuntu22
  - id: ubuntu22-full-x64
    template: ubuntu-full-x64
    install_scripts:
      - install-actions-cache.sh
      - install-runner-package.sh
      - install-apt-common.sh
      - install-azcopy.sh
      - install-azure-cli.sh
      - install-bicep.sh
      - install-aliyun-cli.sh
      - install-apache.sh
      - install-aws-tools.sh
      - install-clang.sh
      - install-cmake.sh
      - install-dotnetcore-sdk.sh
      - install-firefox.sh
      - install-microsoft-edge.sh
      - install-gcc-compilers.sh
      - install-gfortran.sh
      - install-git.sh
      - install-git-lfs.sh
      - install-github-cli.sh
      - install-google-chrome.sh
      - install-java-tools.sh
      - install-kubernetes-tools.sh
      - install-leiningen.sh
      - install-miniconda.sh
      - install-kotlin.sh
      - install-mysql.sh
      - install-mssql-tools.sh
      - install-sqlpackage.sh
      - install-nodejs.sh
      - install-oras-cli.sh
      - install-php.sh
      - install-postgresql.sh
      - install-ruby.sh
      - install-rlang.sh
      - install-rust.sh
      - install-sbt.sh
      - install-selenium.sh
      - install-terraform.sh
      - install-packer.sh
      - configure-dpkg.sh
      - install-yq.sh
      - install-pypy.sh
      - install-python.sh
      - install-zstd.sh
    instance_type: m8a.large
    volume_size: 30
    source_ami_name: ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*
    source_ami_owner: 099720109477
    description: RunsOn Ubuntu22 x64

  - id: ubuntu22-full-arm64
    template: ubuntu-full-arm64
    install_scripts:
      - install-actions-cache.sh
      - install-runner-package.sh
      - install-apt-common.sh
      - install-aws-tools.sh
      - install-clang.sh
      - install-cmake.sh
      - install-gcc-compilers.sh
      - install-git.sh
      - install-git-lfs.sh
      - install-github-cli.sh
      - install-java-tools.sh
      - install-kubernetes-tools.sh
      - install-mysql.sh
      - install-nvm.sh
      - install-nodejs.sh
      - install-postgresql.sh
      - install-ruby.sh
      - install-rust.sh
      - install-terraform.sh
      - configure-dpkg.sh
      - install-yq.sh
      - install-python.sh
      - install-zstd.sh
    instance_type: m8g.large
    volume_size: 30
    source_ami_name: ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-arm64-server-*
    source_ami_owner: 099720109477
    description: RunsOn Ubuntu22 arm64

  - id: ubuntu22-gpu-x64
